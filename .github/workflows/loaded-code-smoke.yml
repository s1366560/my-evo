name: CI - Loaded Code Smoke Test

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - 'package.json'
      - 'package-lock.json'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests & Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript compilation check
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Upload coverage evidence
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/coverage/test-results/
          retention-days: 7

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-build
          path: frontend/.next/
          retention-days: 1

  smoke-gate:
    name: Smoke Gate Verification
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    if: always()

    steps:
      - name: Verify backend tests passed
        run: |
          if [[ "${{ needs.backend-tests.result }}" != "success" ]]; then
            echo "Backend tests failed or did not complete"
            exit 1
          fi
          echo "Backend tests: PASSED"

      - name: Verify frontend build passed
        run: |
          if [[ "${{ needs.frontend-build.result }}" != "success" ]]; then
            echo "Frontend build failed or did not complete"
            exit 1
          fi
          echo "Frontend build: PASSED"

      - name: Gate summary
        run: |
          echo "=== Loaded Code Smoke Gate ==="
          echo "Backend Tests: ${{ needs.backend-tests.result }}"
          echo "Frontend Build: ${{ needs.frontend-build.result }}"
          echo "Gate Status: SUCCESS"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
