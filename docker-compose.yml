# ============================================================
# EvoMap Hub - Docker Compose for Development & Production
# ============================================================
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ============================================================

version: "3.9"

services:
  # ---- Backend API ----
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evomap-backend
    restart: unless-stopped
    ports:
      - "${PORT:-3001}:3001"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3001
      - HOST=0.0.0.0
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=redis://redis:6379
      - NODE_SECRET=${NODE_SECRET:?NODE_SECRET is required}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - FEATURE_NEO4J_ENABLED=${FEATURE_NEO4J_ENABLED:-false}
      - FEATURE_S3_ENABLED=${FEATURE_S3_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - NEO4J_URI=${NEO4J_URI:-}
      - NEO4J_USER=${NEO4J_USER:-}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - evomap-network
    volumes:
      - backend-uploads:/app/uploads

  # ---- Frontend (Next.js Static) ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: evomap-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://backend:3001
      - NEXT_PUBLIC_WS_URL=ws://backend:3001
    depends_on:
      - backend
    networks:
      - evomap-network

  # ---- PostgreSQL Database ----
  db:
    image: postgres:16-alpine
    container_name: evomap-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-evomap}
      - POSTGRES_USER=${POSTGRES_USER:-evomap}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evomap} -d ${POSTGRES_DB:-evomap}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - evomap-network

  # ---- Redis Cache & Queue ----
  redis:
    image: redis:7-alpine
    container_name: evomap-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - evomap-network

  # ---- Optional: Neo4j Knowledge Graph ----
  neo4j:
    image: neo4j:5-community
    container_name: evomap-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_PORT:-7687}:7687"
      - "${NEO4J_HTTP_PORT:-7474}:7474"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_initial__size=256m
      - NEO4J_dbms_memory_heap_max__size=512m
    volumes:
      - neo4j_data:/data
    networks:
      - evomap-network
    profiles:
      - with-neo4j

  # ---- Nginx Reverse Proxy (Production) ----
  nginx:
    image: nginx:alpine
    container_name: evomap-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - evomap-network
    profiles:
      - with-nginx

  # ---- PgAdmin (Development Only) ----
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: evomap-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@evomap.ai
      - PGADMIN_DEFAULT_PASSWORD=admin
    depends_on:
      - db
    networks:
      - evomap-network
    profiles:
      - with-pgadmin

# ============================================================
# Networks
# ============================================================
networks:
  evomap-network:
    driver: bridge

# ============================================================
# Volumes
# ============================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  neo4j_data:
    driver: local
  backend-uploads:
    driver: local
