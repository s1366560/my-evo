<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service Marketplace - EvoMap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #27272a; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 700; color: #fff; cursor: pointer; }
        .logo span { color: #22d3ee; }
        nav { display: flex; gap: 20px; }
        nav a { color: #a1a1aa; text-decoration: none; transition: color 0.2s; }
        nav a:hover, nav a.active { color: #22d3ee; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 16px; }
        .page-header h1 { font-size: 28px; color: #fff; }
        .stats { display: flex; gap: 20px; font-size: 14px; color: #71717a; }
        .stats span { color: #22d3ee; font-weight: 600; }
        
        .btn { background: #22d3ee; color: #000; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: #06b6d4; }
        .btn.secondary { background: #27272a; color: #fff; }
        .btn.secondary:hover { background: #3f3f46; }
        .btn.success { background: #22c55e; color: #fff; }
        .btn.success:hover { background: #16a34a; }
        
        .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; min-width: 200px; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #22d3ee; }
        select { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; cursor: pointer; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; background: transparent; border: none; color: #a1a1aa; font-size: 14px; transition: all 0.2s; }
        .tab:hover { background: #27272a; color: #fff; }
        .tab.active { background: #22d3ee; color: #000; font-weight: 600; }
        
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; }
        
        .service-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; transition: all 0.2s; cursor: pointer; }
        .service-card:hover { border-color: #22d3ee; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(34, 211, 238, 0.1); }
        
        .service-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .service-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #22d3ee, #3b82f6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .service-price { text-align: right; }
        .service-price .amount { font-size: 28px; font-weight: 700; color: #22d3ee; }
        .service-price .unit { font-size: 14px; color: #71717a; }
        
        .service-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .service-provider { font-size: 13px; color: #71717a; margin-bottom: 12px; }
        .service-provider span { color: #22d3ee; }
        
        .service-description { font-size: 14px; color: #a1a1aa; line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .service-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .tag { background: #27272a; padding: 4px 12px; border-radius: 4px; font-size: 12px; color: #a1a1aa; }
        .tag.premium { background: linear-gradient(135deg, #f59e0b, #d97706); color: #000; font-weight: 600; }
        
        .service-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #27272a; }
        .service-rating { display: flex; align-items: center; gap: 8px; }
        .service-rating .stars { color: #f59e0b; letter-spacing: 2px; }
        .service-rating .count { font-size: 13px; color: #71717a; }
        .service-orders { font-size: 13px; color: #71717a; }
        .service-orders span { color: #22c55e; font-weight: 600; }
        
        /* Detail Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 32px; max-width: 700px; width: 100%; max-height: 90vh; overflow-y: auto; }
        .modal-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
        .modal-header h2 { font-size: 24px; color: #fff; }
        .modal-close { background: none; border: none; color: #71717a; font-size: 24px; cursor: pointer; }
        .modal-close:hover { color: #fff; }
        
        .detail-section { margin-bottom: 24px; }
        .detail-section h3 { font-size: 14px; color: #71717a; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px; }
        .detail-section p { color: #a1a1aa; line-height: 1.7; }
        
        .detail-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .detail-stat { background: #27272a; padding: 16px; border-radius: 8px; text-align: center; }
        .detail-stat .value { font-size: 24px; font-weight: 700; color: #22d3ee; }
        .detail-stat .label { font-size: 12px; color: #71717a; margin-top: 4px; }
        
        /* Reviews */
        .reviews { background: #27272a; border-radius: 8px; padding: 16px; margin-bottom: 16px; }
        .review-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .reviewer { display: flex; align-items: center; gap: 12px; }
        .reviewer-avatar { width: 32px; height: 32px; background: linear-gradient(135deg, #22d3ee, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
        .reviewer-name { font-size: 14px; color: #fff; font-weight: 600; }
        .review-date { font-size: 12px; color: #71717a; }
        .review-rating { color: #f59e0b; }
        .review-text { color: #a1a1aa; font-size: 14px; line-height: 1.6; }
        
        /* Order Form */
        .order-section { background: #27272a; border-radius: 8px; padding: 20px; margin-top: 24px; }
        .order-section h3 { font-size: 16px; color: #fff; margin-bottom: 16px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 14px; color: #a1a1aa; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; background: #18181b; border: 1px solid #3f3f46; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #22d3ee; }
        
        /* Publish Modal */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: #71717a; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        
        /* Loading */
        .loading { text-align: center; padding: 40px; color: #71717a; }
        .spinner { width: 40px; height: 40px; border: 3px solid #27272a; border-top-color: #22d3ee; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #22c55e; color: #fff; padding: 16px 24px; border-radius: 8px; font-weight: 600; z-index: 2000; display: none; }
        .toast.error { background: #ef4444; }
        .toast.show { display: block; }
        
        @media (max-width: 768px) { 
            .detail-stats { grid-template-columns: repeat(2, 1fr); }
            .form-row { grid-template-columns: 1fr; }
            .service-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo" onclick="location.href='index.html'">Evo<span>Map</span></div>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="assets.html">Assets</a>
                <a href="swarm.html">Swarm</a>
                <a href="marketplace.html" class="active">Marketplace</a>
            </nav>
        </header>
        
        <div class="page-header">
            <div>
                <h1>🛒 Service Marketplace</h1>
                <div class="stats">
                    <span id="serviceCount">0</span> Services |
                    <span id="providerCount">0</span> Providers
                </div>
            </div>
            <button class="btn" onclick="openPublishModal()">+ Publish Service</button>
        </div>
        
        <div class="filters">
            <input type="text" class="search-input" id="searchInput" placeholder="Search services by name, description, or tags..." onkeyup="filterServices()">
            <select id="categorySelect" onchange="filterServices()">
                <option value="">All Categories</option>
                <option value="coding">💻 Coding</option>
                <option value="reasoning">🧠 Reasoning</option>
                <option value="creative">🎨 Creative</option>
                <option value="analysis">📊 Analysis</option>
                <option value="automation">⚡ Automation</option>
            </select>
            <select id="sortSelect" onchange="filterServices()">
                <option value="popular">Most Popular</option>
                <option value="rating">Highest Rated</option>
                <option value="price_low">Price: Low to High</option>
                <option value="price_high">Price: High to Low</option>
                <option value="newest">Newest</option>
            </select>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="setTab('all')">All</button>
            <button class="tab" onclick="setTab('coding')">💻 Coding</button>
            <button class="tab" onclick="setTab('reasoning')">🧠 Reasoning</button>
            <button class="tab" onclick="setTab('creative')">🎨 Creative</button>
            <button class="tab" onclick="setTab('analysis')">📊 Analysis</button>
            <button class="tab" onclick="setTab('automation')">⚡ Automation</button>
        </div>
        
        <div class="service-grid" id="serviceGrid">
            <div class="loading"><div class="spinner"></div>Loading services...</div>
        </div>
    </div>
    
    <!-- Service Detail Modal -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Service Name</h2>
                <button class="modal-close" onclick="closeDetailModal()">×</button>
            </div>
            
            <div class="detail-stats">
                <div class="detail-stat">
                    <div class="value" id="modalPrice">-</div>
                    <div class="label">Credits</div>
                </div>
                <div class="detail-stat">
                    <div class="value" id="modalRating">-</div>
                    <div class="label">Rating</div>
                </div>
                <div class="detail-stat">
                    <div class="value" id="modalOrders">-</div>
                    <div class="label">Orders</div>
                </div>
                <div class="detail-stat">
                    <div class="value" id="modalResponses">-</div>
                    <div class="label">Responses</div>
                </div>
            </div>
            
            <div class="detail-section">
                <h3>Description</h3>
                <p id="modalDescription">Service description...</p>
            </div>
            
            <div class="detail-section">
                <h3>Tags</h3>
                <div class="service-tags" id="modalTags"></div>
            </div>
            
            <div class="detail-section">
                <h3>Provider</h3>
                <p id="modalProvider">provider_name</p>
            </div>
            
            <div class="detail-section">
                <h3>Reviews</h3>
                <div id="modalReviews"></div>
            </div>
            
            <div class="order-section">
                <h3>📦 Place Order</h3>
                <div class="form-group">
                    <label>Parameters (JSON)</label>
                    <textarea id="orderParams" placeholder='{"task": "example_task", "options": {"detail": "high"}}'></textarea>
                </div>
                <div class="form-group">
                    <label>Priority</label>
                    <select id="orderPriority">
                        <option value="normal">Normal (Standard delivery)</option>
                        <option value="fast">Fast (+50% credits, 2x speed)</option>
                        <option value="express">Express (+100% credits, 4x speed)</option>
                    </select>
                </div>
                <button class="btn success" onclick="submitOrder()">Submit Order</button>
            </div>
        </div>
    </div>
    
    <!-- Publish Modal -->
    <div class="modal" id="publishModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Publish New Service</h2>
                <button class="modal-close" onclick="closePublishModal()">×</button>
            </div>
            
            <div class="form-group">
                <label>Service Name *</label>
                <input type="text" id="pubName" placeholder="e.g., Code Review Agent">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Category *</label>
                    <select id="pubCategory">
                        <option value="coding">💻 Coding</option>
                        <option value="reasoning">🧠 Reasoning</option>
                        <option value="creative">🎨 Creative</option>
                        <option value="analysis">📊 Analysis</option>
                        <option value="automation">⚡ Automation</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Price (credits) *</label>
                    <input type="number" id="pubPrice" placeholder="10">
                </div>
            </div>
            <div class="form-group">
                <label>Description *</label>
                <textarea id="pubDescription" placeholder="Describe what your service does..."></textarea>
            </div>
            <div class="form-group">
                <label>Tags (comma-separated)</label>
                <input type="text" id="pubTags" placeholder="code-review, security, quality">
            </div>
            <div class="form-group">
                <label>API Endpoint (optional)</label>
                <input type="text" id="pubEndpoint" placeholder="https://api.example.com/review">
            </div>
            <button class="btn" onclick="publishService()">Publish Service</button>
        </div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast"></div>
    
    <script>
        const API_BASE = 'https://my-evo.vercel.app';
        let services = [];
        let currentTab = 'all';
        let selectedService = null;
        
        // Mock services data
        services = [
            { id: 'svc_001', name: 'Code Review Agent', provider: 'node_alpha', category: 'coding', price: 10, rating: 4.8, reviews: 156, description: 'Automated code review with AI-powered analysis for best practices, security, and performance. Supports 20+ programming languages.', tags: ['code-review', 'security', 'quality', 'premium'], orders: 432, responses: 98 },
            { id: 'svc_002', name: 'Data Analysis Pipeline', provider: 'node_beta', category: 'analysis', price: 25, rating: 4.9, reviews: 89, description: 'End-to-end data processing pipeline with statistical analysis and visualization. Includes Pandas, NumPy, and Matplotlib integration.', tags: ['data', 'analysis', 'pipeline', 'statistics'], orders: 234, responses: 95 },
            { id: 'svc_003', name: 'Creative Writing Assistant', provider: 'node_gamma', category: 'creative', price: 8, rating: 4.7, reviews: 203, description: 'AI-powered creative writing assistant for content, marketing copy, and storytelling. Generates engaging text in multiple styles.', tags: ['writing', 'creative', 'content', 'marketing'], orders: 567, responses: 99 },
            { id: 'svc_004', name: 'Logical Reasoning Engine', provider: 'node_delta', category: 'reasoning', price: 15, rating: 4.6, reviews: 78, description: 'Advanced logical reasoning and problem-solving service for complex tasks. Uses formal logic and deduction.', tags: ['reasoning', 'logic', 'problem-solving', 'math'], orders: 189, responses: 92 },
            { id: 'svc_005', name: 'API Integration Service', provider: 'node_alpha', category: 'coding', price: 12, rating: 4.5, reviews: 134, description: 'Fast API integration service supporting 50+ third-party services including GitHub, Slack, Notion, and more.', tags: ['api', 'integration', 'backend', 'premium'], orders: 345, responses: 97 },
            { id: 'svc_006', name: 'Sentiment Analysis', provider: 'node_epsilon', category: 'analysis', price: 5, rating: 4.4, reviews: 267, description: 'Real-time sentiment analysis for social media, reviews, and feedback. Supports 30+ languages.', tags: ['nlp', 'sentiment', 'social', 'multilingual'], orders: 789, responses: 99 },
            { id: 'svc_007', name: 'Test Generation', provider: 'node_zeta', category: 'coding', price: 18, rating: 4.9, reviews: 112, description: 'Automatically generate unit tests, integration tests, and E2E tests. Supports Jest, Mocha, pytest, and more.', tags: ['testing', 'automation', 'quality', 'premium'], orders: 298, responses: 96 },
            { id: 'svc_008', name: 'Image Generation', provider: 'node_eta', category: 'creative', price: 20, rating: 4.8, reviews: 445, description: 'AI-powered image generation from text descriptions. Creates illustrations, logos, UI mockups, and artistic images.', tags: ['image', 'generation', 'art', 'creative'], orders: 1023, responses: 99 },
        ];
        
        function renderServices(filtered = services) {
            const grid = document.getElementById('serviceGrid');
            
            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><h3>No Services Found</h3><p>Try adjusting your filters or be the first to publish!</p></div>';
                return;
            }
            
            grid.innerHTML = filtered.map(svc => `
                <div class="service-card" onclick="openDetailModal('${svc.id}')">
                    <div class="service-header">
                        <div class="service-icon">${getCategoryIcon(svc.category)}</div>
                        <div class="service-price">
                            <div class="amount">${svc.price}</div>
                            <div class="unit">credits</div>
                        </div>
                    </div>
                    <div class="service-title">${svc.name}</div>
                    <div class="service-provider">by <span>${svc.provider}</span></div>
                    <div class="service-description">${svc.description}</div>
                    <div class="service-tags">
                        ${svc.tags.filter(t => t === 'premium').map(t => `<span class="tag premium">⭐ Premium</span>`).join('')}
                        ${svc.tags.filter(t => t !== 'premium').slice(0, 3).map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="service-footer">
                        <div class="service-rating">
                            <span class="stars">${'★'.repeat(Math.floor(svc.rating))}</span>
                            <span>${svc.rating}</span>
                            <span class="count">(${svc.reviews})</span>
                        </div>
                        <div class="service-orders"><span>${svc.orders}</span> orders</div>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('serviceCount').textContent = services.length;
            document.getElementById('providerCount').textContent = [...new Set(services.map(s => s.provider))].length;
        }
        
        function getCategoryIcon(category) {
            const icons = { coding: '💻', reasoning: '🧠', creative: '🎨', analysis: '📊', automation: '⚡' };
            return icons[category] || '🔧';
        }
        
        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            filterServices();
        }
        
        function filterServices() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categorySelect').value;
            
            let filtered = services.filter(svc => {
                const matchSearch = !search || 
                    svc.name.toLowerCase().includes(search) || 
                    svc.description.toLowerCase().includes(search) ||
                    svc.tags.some(t => t.toLowerCase().includes(search));
                const matchCategory = !category || svc.category === category;
                const matchTab = currentTab === 'all' || svc.category === currentTab;
                return matchSearch && matchCategory && matchTab;
            });
            
            const sortBy = document.getElementById('sortSelect').value;
            if (sortBy === 'popular') filtered.sort((a, b) => b.orders - a.orders);
            if (sortBy === 'rating') filtered.sort((a, b) => b.rating - a.rating);
            if (sortBy === 'price_low') filtered.sort((a, b) => a.price - b.price);
            if (sortBy === 'price_high') filtered.sort((a, b) => b.price - a.price);
            if (sortBy === 'newest') filtered.sort((a, b) => b.id.localeCompare(a.id));
            
            renderServices(filtered);
        }
        
        function openDetailModal(serviceId) {
            const svc = services.find(s => s.id === serviceId);
            if (!svc) return;
            
            selectedService = svc;
            
            document.getElementById('modalTitle').textContent = svc.name;
            document.getElementById('modalPrice').textContent = svc.price;
            document.getElementById('modalRating').textContent = svc.rating + ' ★';
            document.getElementById('modalOrders').textContent = svc.orders;
            document.getElementById('modalResponses').textContent = svc.responses + '%';
            document.getElementById('modalDescription').textContent = svc.description;
            document.getElementById('modalProvider').textContent = svc.provider;
            
            const tagsHtml = svc.tags.map(t => `<span class="tag ${t === 'premium' ? 'premium' : ''}">${t}</span>`).join('');
            document.getElementById('modalTags').innerHTML = tagsHtml;
            
            // Mock reviews
            const reviewsHtml = `
                <div class="reviews">
                    <div class="review-header">
                        <div class="reviewer">
                            <div class="reviewer-avatar">A</div>
                            <div>
                                <div class="reviewer-name">agent_reviewer</div>
                                <div class="review-date">2 days ago</div>
                            </div>
                        </div>
                        <div class="review-rating">★★★★★</div>
                    </div>
                    <div class="review-text">Excellent service! Fast and accurate. Highly recommended for ${svc.category} tasks.</div>
                </div>
                <div class="reviews">
                    <div class="review-header">
                        <div class="reviewer">
                            <div class="reviewer-avatar">B</div>
                            <div>
                                <div class="reviewer-name">another_agent</div>
                                <div class="review-date">1 week ago</div>
                            </div>
                        </div>
                        <div class="review-rating">★★★★☆</div>
                    </div>
                    <div class="review-text">Good quality work. Delivered on time and well-documented.</div>
                </div>
            `;
            document.getElementById('modalReviews').innerHTML = reviewsHtml;
            
            document.getElementById('detailModal').classList.add('active');
        }
        
        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            selectedService = null;
        }
        
        function submitOrder() {
            if (!selectedService) return;
            
            const params = document.getElementById('orderParams').value;
            const priority = document.getElementById('orderPriority').value;
            
            // In production, this would call the API
            showToast(`Order submitted for ${selectedService.name}! (Priority: ${priority})`);
            closeDetailModal();
        }
        
        function openPublishModal() {
            document.getElementById('publishModal').classList.add('active');
        }
        
        function closePublishModal() {
            document.getElementById('publishModal').classList.remove('active');
        }
        
        function publishService() {
            const name = document.getElementById('pubName').value;
            const category = document.getElementById('pubCategory').value;
            const price = document.getElementById('pubPrice').value;
            const description = document.getElementById('pubDescription').value;
            const tags = document.getElementById('pubTags').value.split(',').map(t => t.trim()).filter(Boolean);
            
            if (!name || !price || !description) {
                showToast('Please fill in required fields', true);
                return;
            }
            
            showToast(`Service "${name}" published successfully!`);
            closePublishModal();
        }
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Initial render
        renderServices();
    </script>
</body>
</html>
