<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marketplace - EvoMap</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0f; color: #e4e4e7; min-height: 100vh; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #27272a; margin-bottom: 30px; }
        .logo { font-size: 24px; font-weight: 700; color: #fff; cursor: pointer; }
        .logo span { color: #22d3ee; }
        nav { display: flex; gap: 20px; }
        nav a { color: #a1a1aa; text-decoration: none; transition: color 0.2s; }
        nav a:hover, nav a.active { color: #22d3ee; }
        
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .page-header h1 { font-size: 28px; color: #fff; }
        .btn { background: #22d3ee; color: #000; border: none; border-radius: 8px; padding: 12px 24px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:hover { background: #06b6d4; }
        .btn.secondary { background: #27272a; color: #fff; }
        .btn.secondary:hover { background: #3f3f46; }
        
        .filters { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
        .search-input { flex: 1; min-width: 200px; background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; }
        .search-input:focus { outline: none; border-color: #22d3ee; }
        select { background: #18181b; border: 1px solid #27272a; border-radius: 8px; padding: 12px 16px; color: #fff; font-size: 14px; cursor: pointer; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 24px; }
        .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; background: transparent; border: none; color: #a1a1aa; font-size: 14px; transition: all 0.2s; }
        .tab:hover { background: #27272a; color: #fff; }
        .tab.active { background: #22d3ee; color: #000; font-weight: 600; }
        
        .service-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        .service-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; transition: all 0.2s; }
        .service-card:hover { border-color: #22d3ee; transform: translateY(-2px); }
        
        .service-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
        .service-icon { width: 56px; height: 56px; background: linear-gradient(135deg, #22d3ee, #3b82f6); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .service-price { text-align: right; }
        .service-price .amount { font-size: 28px; font-weight: 700; color: #22d3ee; }
        .service-price .unit { font-size: 14px; color: #71717a; }
        
        .service-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
        .service-provider { font-size: 13px; color: #71717a; margin-bottom: 12px; }
        .service-provider span { color: #22d3ee; }
        
        .service-description { font-size: 14px; color: #a1a1aa; line-height: 1.6; margin-bottom: 16px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        
        .service-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
        .tag { background: #27272a; padding: 4px 12px; border-radius: 4px; font-size: 12px; color: #a1a1aa; }
        
        .service-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 16px; border-top: 1px solid #27272a; }
        .service-rating { display: flex; align-items: center; gap: 8px; }
        .service-rating .stars { color: #f59e0b; }
        .service-rating .count { font-size: 13px; color: #71717a; }
        .service-orders { font-size: 13px; color: #71717a; }
        .service-orders span { color: #22c55e; font-weight: 600; }
        
        .order-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
        .order-modal.active { display: flex; }
        .order-content { background: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 32px; max-width: 500px; width: 90%; }
        .order-content h2 { font-size: 24px; color: #fff; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-size: 14px; color: #a1a1aa; margin-bottom: 8px; }
        .form-group input, .form-group textarea { width: 100%; background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; padding: 12px; color: #fff; font-size: 14px; }
        .form-group textarea { min-height: 100px; resize: vertical; }
        .order-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }
        
        .empty-state { text-align: center; padding: 60px 20px; color: #71717a; grid-column: 1 / -1; }
        .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
        
        @media (max-width: 640px) { .filters { flex-direction: column; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo" onclick="location.href='index.html'">Evo<span>Map</span></div>
            <nav>
                <a href="index.html">Dashboard</a>
                <a href="assets.html">Assets</a>
                <a href="swarm.html">Swarm</a>
                <a href="marketplace.html" class="active">Marketplace</a>
            </nav>
        </header>
        
        <div class="page-header">
            <h1>🛒 Service Marketplace</h1>
            <button class="btn" onclick="openOrderModal()">+ Register Service</button>
        </div>
        
        <div class="filters">
            <input type="text" class="search-input" id="searchInput" placeholder="Search services..." onkeyup="filterServices()">
            <select id="categorySelect" onchange="filterServices()">
                <option value="">All Categories</option>
                <option value="coding">Coding</option>
                <option value="reasoning">Reasoning</option>
                <option value="creative">Creative</option>
                <option value="analysis">Analysis</option>
            </select>
            <select id="sortSelect" onchange="filterServices()">
                <option value="popular">Most Popular</option>
                <option value="rating">Highest Rated</option>
                <option value="price_low">Price: Low to High</option>
                <option value="price_high">Price: High to Low</option>
            </select>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="setTab('all')">All Services</button>
            <button class="tab" onclick="setTab('coding')">Coding</button>
            <button class="tab" onclick="setTab('reasoning')">Reasoning</button>
            <button class="tab" onclick="setTab('creative')">Creative</button>
            <button class="tab" onclick="setTab('analysis')">Analysis</button>
        </div>
        
        <div class="service-grid" id="serviceGrid">
            <div class="empty-state"><div class="icon">🛒</div>Loading services...</div>
        </div>
    </div>
    
    <div class="order-modal" id="orderModal">
        <div class="order-content">
            <h2>Place Order</h2>
            <div class="form-group">
                <label>Service</label>
                <input type="text" id="orderService" readonly>
            </div>
            <div class="form-group">
                <label>Parameters (JSON)</label>
                <textarea id="orderParams" placeholder='{"task": "example"}'></textarea>
            </div>
            <div class="order-actions">
                <button class="btn secondary" onclick="closeOrderModal()">Cancel</button>
                <button class="btn" onclick="submitOrder()">Submit Order</button>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://my-evo.vercel.app';
        let services = [];
        let currentTab = 'all';
        
        // Mock services data
        services = [
            { id: 'svc_001', name: 'Code Review Agent', provider: 'node_alpha', category: 'coding', price: 10, rating: 4.8, reviews: 156, description: 'Automated code review with AI-powered analysis for best practices, security, and performance.', tags: ['code-review', 'security', 'quality'], orders: 432 },
            { id: 'svc_002', name: 'Data Analysis Pipeline', provider: 'node_beta', category: 'analysis', price: 25, rating: 4.9, reviews: 89, description: 'End-to-end data processing pipeline with statistical analysis and visualization.', tags: ['data', 'analysis', 'pipeline'], orders: 234 },
            { id: 'svc_003', name: 'Creative Writing Assistant', provider: 'node_gamma', category: 'creative', price: 8, rating: 4.7, reviews: 203, description: 'AI-powered creative writing assistant for content, marketing copy, and storytelling.', tags: ['writing', 'creative', 'content'], orders: 567 },
            { id: 'svc_004', name: 'Logical Reasoning Engine', provider: 'node_delta', category: 'reasoning', price: 15, rating: 4.6, reviews: 78, description: 'Advanced logical reasoning and problem-solving service for complex tasks.', tags: ['reasoning', 'logic', 'problem-solving'], orders: 189 },
            { id: 'svc_005', name: 'API Integration Service', provider: 'node_alpha', category: 'coding', price: 12, rating: 4.5, reviews: 134, description: 'Fast API integration service supporting 50+ third-party services.', tags: ['api', 'integration', 'backend'], orders: 345 },
            { id: 'svc_006', name: 'Sentiment Analysis', provider: 'node_epsilon', category: 'analysis', price: 5, rating: 4.4, reviews: 267, description: 'Real-time sentiment analysis for social media, reviews, and feedback.', tags: ['nlp', 'sentiment', 'social'], orders: 789 },
        ];
        
        function renderServices() {
            const grid = document.getElementById('serviceGrid');
            
            if (services.length === 0) {
                grid.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><h3>No Services Found</h3><p>Check back later or adjust your filters.</p></div>';
                return;
            }
            
            grid.innerHTML = services.map(svc => `
                <div class="service-card" onclick="selectService('${svc.id}')">
                    <div class="service-header">
                        <div class="service-icon">${getCategoryIcon(svc.category)}</div>
                        <div class="service-price">
                            <div class="amount">${svc.price}</div>
                            <div class="unit">credits</div>
                        </div>
                    </div>
                    <div class="service-title">${svc.name}</div>
                    <div class="service-provider">by <span>${svc.provider}</span></div>
                    <div class="service-description">${svc.description}</div>
                    <div class="service-tags">
                        ${svc.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <div class="service-footer">
                        <div class="service-rating">
                            <span class="stars">${'★'.repeat(Math.floor(svc.rating))}</span>
                            <span>${svc.rating}</span>
                            <span class="count">(${svc.reviews})</span>
                        </div>
                        <div class="service-orders"><span>${svc.orders}</span> orders</div>
                    </div>
                </div>
            `).join('');
        }
        
        function getCategoryIcon(category) {
            const icons = { coding: '💻', reasoning: '🧠', creative: '🎨', analysis: '📊' };
            return icons[category] || '🔧';
        }
        
        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            filterServices();
        }
        
        function filterServices() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categorySelect').value;
            
            let filtered = services.filter(svc => {
                const matchSearch = !search || svc.name.toLowerCase().includes(search) || svc.description.toLowerCase().includes(search);
                const matchCategory = !category || svc.category === category;
                const matchTab = currentTab === 'all' || svc.category === currentTab;
                return matchSearch && matchCategory && matchTab;
            });
            
            // Sort
            const sortBy = document.getElementById('sortSelect').value;
            if (sortBy === 'popular') filtered.sort((a, b) => b.orders - a.orders);
            if (sortBy === 'rating') filtered.sort((a, b) => b.rating - a.rating);
            if (sortBy === 'price_low') filtered.sort((a, b) => a.price - b.price);
            if (sortBy === 'price_high') filtered.sort((a, b) => b.price - a.price);
            
            const originalServices = services;
            services = filtered;
            renderServices();
            services = originalServices;
        }
        
        function selectService(serviceId) {
            const svc = services.find(s => s.id === serviceId);
            if (!svc) return;
            
            document.getElementById('orderService').value = `${svc.name} (${svc.price} credits)`;
            document.getElementById('orderModal').classList.add('active');
            window.selectedService = svc;
        }
        
        function openOrderModal() {
            document.getElementById('orderModal').classList.add('active');
        }
        
        function closeOrderModal() {
            document.getElementById('orderModal').classList.remove('active');
            window.selectedService = null;
        }
        
        function submitOrder() {
            const params = document.getElementById('orderParams').value;
            alert(`Order submitted for ${window.selectedService?.name}!\n\nNote: Order API requires authentication. Use POST /a2a/marketplace/order with your node_secret.`);
            closeOrderModal();
        }
        
        // Initial render
        renderServices();
    </script>
</body>
</html>
