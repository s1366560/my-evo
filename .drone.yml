kind: pipeline
type: docker
name: workspace-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main

# Docker socket for host-socket deploy mode
volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f package.json
      - test -f backend/package.json
      - test -f frontend/package.json
      - node -e 'const fs=require("fs"); for (const f of ["package.json","backend/package.json","frontend/package.json"]) { const pkg=JSON.parse(fs.readFileSync(f,"utf8")); if (!pkg.scripts || Object.keys(pkg.scripts).length === 0) throw new Error(f + " has no scripts"); }'

  - name: backend-test
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm test
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: plugins/docker:20
    settings:
      repo: host.docker.internal:5001/my-evo
      tags:
        - drone-docker-e2e
        - latest
      registry: host.docker.internal:5001
      insecure: true
      purge: true
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker rm -f my-evo-app my-evo-postgres my-evo-redis 2>/dev/null || true
      - docker network rm workspace-deploy 2>/dev/null || true
      - docker network create workspace-deploy
      - docker run -d --name my-evo-postgres --network workspace-deploy -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=evomap postgres:16-alpine
      - for i in $(seq 1 30); do docker exec my-evo-postgres pg_isready -U postgres >/dev/null 2>&1 && break || sleep 1; done
      - docker run -d --name my-evo-redis --network workspace-deploy redis:7-alpine
      - docker build -t my-evo:drone-docker-e2e -f Dockerfile .
      - docker run -d --name my-evo-app --network workspace-deploy -p 18080:3001 -e NODE_ENV=production -e DATABASE_URL=postgresql://postgres:postgres@my-evo-postgres:5432/evomap -e REDIS_URL=redis://my-evo-redis:6379 my-evo:drone-docker-e2e
      - sleep 10
      - wget -qO- http://host.docker.internal:18080/health || (docker logs my-evo-app && docker ps -a && exit 1)
    when:
      event:
        - push
        - custom
