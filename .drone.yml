kind: pipeline
type: docker
name: workspace-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f package.json
      - test -f backend/package.json
      - test -f frontend/package.json
      - node -e 'const fs=require("fs"); for (const f of ["package.json","backend/package.json","frontend/package.json"]) { const pkg=JSON.parse(fs.readFileSync(f,"utf8")); if (!pkg.scripts || Object.keys(pkg.scripts).length === 0) throw new Error(f + " has no scripts"); }'

  - name: backend-test
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm test
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: plugins/docker:20
    settings:
      repo: host.docker.internal:5001/my-evo
      tags:
        - drone-docker-e2e
        - latest
      registry: host.docker.internal:5001
      insecure: true
      purge: true
    when:
      event:
        - push
        - custom

  - name: docker-build-frontend
    image: plugins/docker:20
    settings:
      repo: host.docker.internal:5001/my-evo-frontend
      tags:
        - drone-docker-e2e
        - latest
      registry: host.docker.internal:5001
      insecure: true
      purge: true
      dockerfile: frontend/Dockerfile
      context: frontend
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker rm -f my-evo-backend my-evo-frontend my-evo-postgres my-evo-redis 2>/dev/null || true
      - docker network create workspace-deploy 2>/dev/null || true
      - docker run -d --name my-evo-postgres --network workspace-deploy -e POSTGRES_USER=postgres -e POSTGRES_PASSWORD=postgres -e POSTGRES_DB=evomap postgres:16-alpine
      - for i in $(seq 1 30); do docker exec my-evo-postgres pg_isready -U postgres >/dev/null 2>&1 && break || sleep 1; done
      - docker run -d --name my-evo-redis --network workspace-deploy redis:7-alpine
      - sleep 2
      - docker build -t my-evo:drone-docker-e2e -f Dockerfile .
      - docker build -t my-evo-frontend:drone-docker-e2e -f frontend/Dockerfile frontend
      - docker run -d --name my-evo-backend --network workspace-deploy -p 18080:3001 -e PORT=3001 -e HOST=0.0.0.0 -e DATABASE_URL=postgresql://postgres:postgres@my-evo-postgres:5432/evomap -e NODE_SECRET=dev-secret -e LOG_LEVEL=info my-evo:drone-docker-e2e
      - docker run -d --name my-evo-frontend --network workspace-deploy -p 18081:3000 -e NODE_ENV=production -e NEXT_PUBLIC_API_URL=http://my-evo-backend:3001 my-evo-frontend:drone-docker-e2e
      - sleep 15
      - 'wget -qO- http://host.docker.internal:18080/health || { docker ps -a; docker logs my-evo-backend; exit 1; }'
      - 'wget -qO- http://host.docker.internal:18081/ || { docker ps -a; docker logs my-evo-frontend; exit 1; }'
      - 'echo "Deployment successful: backend and frontend containers are healthy"'
    when:
      event:
        - push
        - custom

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
