kind: pipeline
type: docker
name: workspace-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f package.json
      - test -f backend/package.json
      - test -f frontend/package.json
      - node -e 'const fs=require("fs"); for (const f of ["package.json","backend/package.json","frontend/package.json"]) { const pkg=JSON.parse(fs.readFileSync(f,"utf8")); if (!pkg.scripts || Object.keys(pkg.scripts).length === 0) throw new Error(f + " has no scripts"); }'

  - name: backend-test
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm test
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: build
    image: node:20-alpine
    commands:
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: plugins/docker:20
    settings:
      repo: host.docker.internal:5001/my-evo
      tags:
        - drone-docker-e2e
        - latest
      registry: host.docker.internal:5001
      insecure: true
      purge: true
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      # Build the image locally using the mounted host Docker socket
      - docker build -t my-evo:drone-docker-e2e -f Dockerfile .
      # Create a dedicated Docker network for the deploy
      - docker network create workspace-deploy 2>/dev/null || true
      # Start PostgreSQL sidecar on the deploy network with correct env vars
      - >
        docker run -d --name my-evo-postgres --network workspace-deploy
        -e POSTGRES_USER=postgres
        -e POSTGRES_PASSWORD=postgres
        -e POSTGRES_DB=evomap
        postgres:16-alpine
      # Wait for PostgreSQL to be ready
      - >
        for i in $(seq 1 30); do
          docker exec my-evo-postgres pg_isready -U postgres >/dev/null 2>&1 && break || sleep 1;
        done
      # Remove any previous container
      - docker rm -f my-evo 2>/dev/null || true
      # Run the app container on the deploy network with correct port mapping
      - >
        docker run -d --name my-evo --network workspace-deploy
        -p 18080:3001
        -e DATABASE_URL=postgresql://postgres:postgres@my-evo-postgres:5432/evomap
        -e NODE_ENV=production
        my-evo:drone-docker-e2e
      # Wait for the app to start
      - sleep 10
      # Install wget inside app container (node:alpine base, has wget via apk)
      - docker exec my-evo apk add --no-cache wget >/dev/null 2>&1 || true
      # Health check via docker exec inside the app container (avoids host network issues)
      - >
        docker exec my-evo wget -qO- http://localhost:3001/health >/dev/null
        || { echo "=== HEALTH CHECK FAILED ===" && docker logs my-evo && docker ps -a && exit 1; }
    when:
      event:
        - push
        - custom

volumes:
  - name: docker-sock
    host:
      path: /var/run/docker.sock
