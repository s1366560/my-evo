kind: pipeline
type: docker
name: workspace-ci

platform:
  os: linux
  arch: arm64

trigger:
  event:
    - push
    - custom
  branch:
    - main

steps:
  - name: repository-smoke
    image: node:20-alpine
    commands:
      - node --version
      - npm --version
      - test -f package.json
      - test -f backend/package.json
      - test -f frontend/package.json
      - node -e 'const fs=require("fs"); for (const f of ["package.json","backend/package.json","frontend/package.json"]) { const pkg=JSON.parse(fs.readFileSync(f,"utf8")); if (!pkg.scripts || Object.keys(pkg.scripts).length === 0) throw new Error(f + " has no scripts"); }'

  - name: backend-test
    image: node:20-alpine
    commands:
      - cd backend
      - npm install --silent
      - npm test
    when:
      event:
        - push
        - custom

  - name: frontend-build
    image: node:20-alpine
    commands:
      - cd frontend
      - npm install --silent
      - npm run build
    when:
      event:
        - push
        - custom

  - name: docker-build
    image: plugins/docker:20
    settings:
      repo: host.docker.internal:5001/my-evo
      tags:
        - drone-docker-e2e
        - latest
      registry: host.docker.internal:5001
      insecure: true
      purge: true
    when:
      event:
        - push
        - custom

  - name: deploy
    image: docker:cli
    environment:
      DOCKER_HOST: tcp://docker:2376
    commands:
      - docker pull host.docker.internal:5001/my-evo:drone-docker-e2e
      - docker run -d --name my-evo-app --restart unless-stopped -p 8080:3001 -e NODE_ENV=production -e DATABASE_URL=postgresql://evomap:evomap_secret@host.docker.internal:5432/evomap host.docker.internal:5001/my-evo:drone-docker-e2e
      - sleep 5
      - wget -qO- http://localhost:8080/health || (docker logs my-evo-app && exit 1)
    when:
      event:
        - push
        - custom
