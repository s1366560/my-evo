# CDN Cache Configuration for EvoMap Hub
# This file contains caching directives for CDN providers

# Cache Key Strategy
# CDN providers: CloudFlare, Fastly, CloudFront, Akamai
# Key format: ${protocol}://${host}${request_uri}${query_string}
# SHA256 hash of normalized key for cache busting

# Cache-Control Headers (by content type)

# Static Assets - Immutable, long-term caching
# Files with content-hash in filename: JS chunks, CSS, images
location ~* \.(js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|webp|avif|svg|woff)$ {
    # CDN edge cache: 1 year (31536000s)
    # Browser cache: 1 year
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    
    # Enable gzip/br compression
    gzip on;
    gzip_vary on;
    
    # CORS headers for CDN
    add_header Access-Control-Allow-Origin "*";
    
    # Cache tag headers for purging (CloudFlare, Fastly)
    add_header Cache-Tag "static";
}

# HTML Pages - Short cache with revalidation
location ~* \.html$ {
    expires -1;
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    add_header Expires "0";
}

# API Responses - No cache or short cache
location /api/ {
    # Do not cache API responses by default
    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    add_header Pragma "no-cache";
    
    # Allow stale-while-revalidate for GET requests (60s)
    # Useful for high-traffic endpoints
    # add_header Cache-Control "public, max-age=0, stale-while-revalidate=60";
}

# User-specific content - Private cache
location /account/ {
    add_header Cache-Control "private, no-cache, no-store";
}

# Health and status endpoints - No cache
location /health {
    add_header Cache-Control "no-cache, no-store";
    add_header Content-Type "application/json";
}

# Static files with no fingerprint - Short cache
location ~ ^/(static|public)/ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800, must-revalidate";
}

# Performance: Brotli compression (if supported)
# Note: Requires ngx_brotli module
# brotli on;
# brotli_types text/plain text/css application/javascript application/json;
# brotli_comp_level 6;

# Brotli fallback to gzip
map $http_accept_encoding $compression_type {
    ~br    "br";
    ~gzip  "gzip";
    default "none";
}

# Cache Purge Headers (for programmatic invalidation)
# CloudFlare: Purge by Cache-Tag
# add_header X-CF-Cache-Key "evomap-${content_type}";

# Fastly: Surrogate-Key headers from origin
# add_header Surrogate-Key "evomap";

# Image Optimization Headers
location ~* \.(jpg|jpeg|png|gif|webp|avif)$ {
    # Enable image compression
    add_header X-Content-Type-Options "nosniff";
    
    # Cache optimized images
    expires 30d;
    add_header Cache-Control "public, max-age=2592000, immutable";
}
