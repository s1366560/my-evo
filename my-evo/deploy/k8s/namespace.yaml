apiVersion: v1
kind: Namespace
metadata:
  name: evomap
  labels:
    name: evomap
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: evomap-quota
  namespace: evomap
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 8Gi
    limits.cpu: "8"
    limits.memory: 16Gi
    pods: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: evomap-limits
  namespace: evomap
spec:
  limits:
  - max:
      cpu: "4"
      memory: 8Gi
    min:
      cpu: 100m
      memory: 128Mi
    default:
      cpu: 500m
      memory: 512Mi
    defaultRequest:
      cpu: 200m
      memory: 256Mi
    type: Container
