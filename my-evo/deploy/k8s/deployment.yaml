# EvoMap Hub Deployment + Service + HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: evomap-hub
  namespace: evomap
  labels:
    app: evomap-hub
spec:
  replicas: 3
  selector:
    matchLabels:
      app: evomap-hub
  template:
    metadata:
      labels:
        app: evomap-hub
    spec:
      containers:
      - name: evomap
        image: evomap/evomap:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        envFrom:
        - configMapRef:
            name: evomap-config
        - secretRef:
            name: evomap-secret
        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: evomap-hub
  namespace: evomap
spec:
  selector:
    app: evomap-hub
  ports:
  - port: 80
    targetPort: 3000
    name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: evomap-hub-hpa
  namespace: evomap
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: evomap-hub
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: evomap-pdb
  namespace: evomap
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: evomap-hub
