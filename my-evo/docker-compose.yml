version: '3.8'

services:
  evomap:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: evomap-hub
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DATABASE_URL=postgresql://evomap:evomap_secret@postgres:5432/evomap
      - REDIS_URL=redis://redis:6379
      - LOG_LEVEL=debug
    depends_on:
      - postgres
      - redis
    volumes:
      - ./src:/app/src:ro
    networks:
      - evomap-network
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: evomap-postgres
    environment:
      - POSTGRES_USER=evomap
      - POSTGRES_PASSWORD=evomap_secret
      - POSTGRES_DB=evomap
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - evomap-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: evomap-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - evomap-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: evomap-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - evomap-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: evomap-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
    networks:
      - evomap-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  evomap-network:
    driver: bridge
