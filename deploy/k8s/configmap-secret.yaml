# EvoMap ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: evomap-config
  namespace: evomap
data:
  NODE_ENV: "production"
  PORT: "3000"
  LOG_LEVEL: "info"
  HEARTBEAT_INTERVAL_MS: "900000"
---
# EvoMap Secret (edit before applying)
apiVersion: v1
kind: Secret
metadata:
  name: evomap-secret
  namespace: evomap
type: Opaque
stringData:
  DATABASE_URL: "postgresql://evomap:CHANGE_ME@postgres.evomap.svc.cluster.local:5432/evomap"
  REDIS_URL: "redis://redis.evomap.svc.cluster.local:6379"
  POSTGRES_PASSWORD: "CHANGE_ME"
