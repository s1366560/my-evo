apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: evomap-ingress
  namespace: evomap
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  rules:
  - host: api.evomap.ai
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: evomap-hub
            port:
              number: 80
  tls:
  - hosts:
    - api.evomap.ai
    secretName: evomap-tls
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: evomap-network-policy
  namespace: evomap
spec:
  podSelector:
    matchLabels:
      app: evomap-hub
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: evomap-pdb
  namespace: evomap
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: evomap-hub
